<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自然语言处理课程聊天助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .chat-container {
            width: 100%;
            max-width: 600px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .chat-header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            margin-bottom: 15px;
            max-width: 80%;
        }
        
        .user-message {
            background-color: #E3F2FD;
            border-radius: 18px 18px 4px 18px;
            padding: 10px 15px;
            margin-left: auto;
        }
        
        .bot-message {
            background-color: #F1F1F1;
            border-radius: 18px 18px 18px 4px;
            padding: 10px 15px;
        }
        
        .message-content {
            word-wrap: break-word;
        }
        
        .chat-input {
            display: flex;
            padding: 10px;
            border-top: 1px solid #E0E0E0;
        }
        
        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #E0E0E0;
            border-radius: 20px;
            margin-right: 10px;
        }
        
        .chat-input button {
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-input button:hover {
            background-color: #45a049;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: #4CAF50;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">自然语言处理课程聊天助手</div>
        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">
                <div class="message-content">你好！我是自然语言处理课程的助教，有什么可以帮助你的吗？</div>
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="message-input" placeholder="请输入消息...">
            <button id="send-button">➤</button>
        </div>
    </div>
    
    <script>
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        
        function addMessage(content, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = isUser ? 'message user-message' : 'message bot-message';
            messageDiv.innerHTML = `<div class="message-content">${content}</div>`;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function addLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot-message';
            loadingDiv.id = 'loading';
            loadingDiv.innerHTML = `<div class="message-content"><div class="loading"></div></div>`;
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function removeLoading() {
            const loadingDiv = document.getElementById('loading');
            if (loadingDiv) {
                loadingDiv.remove();
            }
        }
        
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // 添加用户消息
            addMessage(message, true);
            messageInput.value = '';
            
            // 显示加载状态
            addLoading();
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message })
                });
                
                const data = await response.json();
                removeLoading();
                
                if (data.error) {
                    addMessage(`错误：${data.error}`, false);
                } else {
                    addMessage(data.answer, false);
                }
            } catch (error) {
                removeLoading();
                addMessage(`错误：${error.message}`, false);
            }
        }
        
        // 发送按钮点击事件
        sendButton.addEventListener('click', sendMessage);
        
        // 回车键发送
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
